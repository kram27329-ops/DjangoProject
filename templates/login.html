<!DOCTYPE html>
<html>
<head>
    <title>Login - Fashion Hub</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#111827,#2563eb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 10px 30px rgba(0,0,0,0.3);
        }

        h2{
            text-align:center;
            margin-bottom:20px;
            color:#111827;
        }

       input{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}

select{
    width:100%;
    padding:12px;
    margin-bottom:15px;
    border:1px solid #ccc;
    border-radius:8px;
    box-sizing:border-box;
}
        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
            font-size:16px;
        }

        button:hover{
            background:#1d4ed8;
        }

        .link{
            text-align:center;
            margin-top:10px;
        }

        .link a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }

        .error{
            color:red;
            text-align:center;
            margin-bottom:10px;
        }

        .admin-note{
            text-align:center;
            font-size:13px;
            color:#666;
            margin-bottom:10px;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>RAM TEST LOGIN</h2>
    {% if error %}
        <p class="error">{{ error }}</p>
    {% endif %}

    <form method="POST">
        {% csrf_token %}
<select name="role" id="role">
    <option value="user">User Login</option>
    <option value="admin">Admin Login</option>
</select>


        <input
            type="text"
            name="username"
            placeholder="Username"
            required
        >

        <input
            type="password"
            name="password"
            placeholder="Password"
            required
        >

        <!-- Admin Secret Code -->
        <input
            type="text"
            name="admin_code"
            placeholder="Admin Secret Code (Admins Only)"
        >

        <p class="admin-note">
            Normal users can leave this empty.
        </p>

        <button type="submit">
            Login
        </button>
    </form>

    <div class="link">
        Don't have account?
        <a href="/signup/">Signup</a>
    </div>

</div>

</body>
</html>
