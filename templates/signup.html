<!DOCTYPE html>
<html>
<head>
    <title>Signup</title>

    <style>
        body{
            margin:0;
            font-family:Arial;
            background:linear-gradient(135deg,#111827,#2563eb);
            height:100vh;
            display:flex;
            justify-content:center;
            align-items:center;
        }

        .box{
            width:350px;
            background:white;
            padding:30px;
            border-radius:12px;
        }

        input, select{
            width:100%;
            padding:12px;
            margin-bottom:15px;
            border:1px solid #ccc;
            border-radius:8px;
        }

        button{
            width:100%;
            padding:12px;
            background:#2563eb;
            color:white;
            border:none;
            border-radius:8px;
            cursor:pointer;
        }

        button:hover{
            background:#1d4ed8;
        }

        p{
            text-align:center;
        }

        a{
            color:#2563eb;
            text-decoration:none;
            font-weight:bold;
        }
    </style>
</head>

<body>

<div class="box">

    <h2>Signup</h2>

    <!-- ✅ ONLY ONE FORM -->
    <form method="POST">
        {% csrf_token %}

        <input type="text" name="username" placeholder="Username" required>

        <input type="password" name="password" placeholder="Password" required>

        <select name="role" required>
            <option value="user">User</option>
            <option value="admin">Admin</option>
        </select>

        <button type="submit">Signup</button>
    </form>

    <p>Already have account? <a href="/login/">Login</a></p>

</div>

</body>
</html>
