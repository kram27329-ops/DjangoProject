<!DOCTYPE html>
<html>
<head>
    <title>Add Product - Fashion Hub</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:linear-gradient(135deg, #eef2ff, #f8fafc);
        }

        .navbar{
            background:#111827;
            color:white;
            padding:15px 40px;
            display:flex;
            justify-content:space-between;
            align-items:center;
        }

        .logo{
            font-size:24px;
            font-weight:bold;
            color:#00e5ff;
        }

        .home-btn{
            color:white;
            text-decoration:none;
            font-weight:bold;
        }

        .container{
            width:650px;
            margin:40px auto;
            background:white;
            padding:35px;
            border-radius:15px;
            box-shadow:0 10px 30px rgba(0,0,0,0.15);
            transition:0.3s;
        }

        .container:hover{
            transform:translateY(-3px);
        }

        h2{
            text-align:center;
            margin-bottom:10px;
            color:#111827;
        }

        .note{
            text-align:center;
            color:gray;
            margin-bottom:25px;
            font-size:14px;
        }

        form p{
            margin-bottom:15px;
        }

        label{
            font-weight:bold;
            display:block;
            margin-bottom:5px;
        }

        input,
        select,
        textarea{
            width:100%;
            padding:12px;
            border:1px solid #d1d5db;
            border-radius:8px;
            font-size:15px;
            outline:none;
        }

        input:focus,
        select:focus,
        textarea:focus{
            border-color:#2563eb;
            box-shadow:0 0 5px rgba(37,99,235,0.3);
        }

        textarea{
            resize:none;
        }

        .save-btn{
            width:100%;
            background:#22c55e;
            color:white;
            border:none;
            padding:14px;
            border-radius:8px;
            font-size:17px;
            cursor:pointer;
            margin-top:10px;
            transition:0.3s;
        }

        .save-btn:hover{
            background:#16a34a;
        }

        .back-btn{
            display:block;
            text-align:center;
            margin-top:20px;
            text-decoration:none;
            color:#2563eb;
            font-weight:bold;
        }

    </style>
</head>

<body>

<div class="navbar">
    <div class="logo">FASHION HUB</div>

    <a href="/" class="home-btn">
        ← Home
    </a>
</div>

<div class="container">

    <h2>➕ Add / Edit Product</h2>

    <p class="note">
        Admin only - Fill all details carefully
    </p>

    <form method="POST" enctype="multipart/form-data">
        {% csrf_token %}

        {{ form.as_p }}

        <button type="submit" class="save-btn">
            Save Product
        </button>
    </form>

    <a href="/" class="back-btn">
        ← Back To Home
    </a>

</div>

</body>
</html>
