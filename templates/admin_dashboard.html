<!DOCTYPE html>
<html>
<head>
    <title>Admin Dashboard</title>
    <style>
        body{
            font-family:Arial;
            background:#f3f4f6;
            padding:20px;
        }

        .box{
            background:white;
            padding:20px;
            border-radius:10px;
            margin-bottom:20px;
        }

        h2{
            color:#111827;
        }

        table{
            width:100%;
            border-collapse:collapse;
        }

        th,td{
            border:1px solid #ddd;
            padding:10px;
        }

        th{
            background:#111827;
            color:white;
        }
    </style>
</head>

<body>

<h1>👑 Admin Dashboard</h1>

<div class="box">
    <h2>Products</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Title</th>
            <th>Price</th>
        </tr>

        {% for p in products %}
        <tr>
            <td>{{ p.id }}</td>
            <td>{{ p.title }}</td>
            <td>{{ p.price }}</td>
        </tr>
        {% endfor %}
    </table>
</div>


<div class="box">
    <h2>Users</h2>

    <table>
        <tr>
            <th>ID</th>
            <th>Username</th>
            <th>Admin?</th>
        </tr>

        {% for u in users %}
        <tr>
            <td>{{ u.id }}</td>
            <td>{{ u.username }}</td>
            <td>{{ u.is_superuser }}</td>
        </tr>
        {% endfor %}
    </table>
</div>

</body>
</html>
