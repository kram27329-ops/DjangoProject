<!DOCTYPE html>
<html>
<head>
    <title>{{ product.title }}</title>

    <style>

        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial,sans-serif;
        }

        body{
            background:#f5f5f5;
        }

        .container{
            width:90%;
            max-width:1100px;
            margin:40px auto;
            display:flex;
            gap:40px;
            background:white;
            padding:30px;
            border-radius:12px;
            box-shadow:0 0 15px rgba(0,0,0,0.1);
        }

        .image-section{
            flex:1;
            text-align:center;
        }

        .image-section img{
            width:100%;
            max-width:450px;
            border-radius:10px;
        }

        .details{
            flex:1;
        }

        .title{
            font-size:34px;
            margin-bottom:15px;
            color:#111827;
        }

        .brand{
            color:#6b7280;
            font-size:18px;
            margin-bottom:10px;
        }

        .price{
            font-size:30px;
            color:green;
            font-weight:bold;
            margin-bottom:15px;
        }

        .category{
            font-size:18px;
            color:#555;
            margin-bottom:15px;
        }

        .description{
            margin-top:20px;
            line-height:1.7;
            color:#444;
        }

        .btn-area{
            margin-top:30px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            text-decoration:none;
            border-radius:8px;
            font-weight:bold;
            margin-right:10px;
        }

        .buy-btn{
            background:#ffd814;
            color:black;
        }

        .cart-btn{
            background:#ffa41c;
            color:white;
        }

        .back-btn{
            background:#2563eb;
            color:white;
        }

    </style>
</head>

<body>

<div class="container">

    <div class="image-section">
        <img src="{{ product.image.url }}" alt="{{ product.title }}">
    </div>

    <div class="details">

        <h1 class="title">
            {{ product.title }}
        </h1>

        <p class="brand">
            Brand : {{ product.brand }}
        </p>

        <p class="price">
            ₹ {{ product.price }}
        </p>

        <p class="category">
            Category : {{ product.category }}
        </p>

        <div class="description">
            <strong>Description:</strong><br><br>
            {{ product.description }}
        </div>

        <div class="btn-area">

            <a href="#" class="btn buy-btn">
                Buy Now
            </a>

            <a href="/add-to-cart/{{ product.id }}/"
               class="btn cart-btn">
                Add To Cart 🛒
            </a>

            <a href="/"
               class="btn back-btn">
                Back To Home
            </a>

        </div>

    </div>

</div>

</body>
</html>
