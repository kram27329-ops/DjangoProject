<!DOCTYPE html>
<html>
<head>
    <title>{{ product.title }}</title>

    <style>
        *{
            margin:0;
            padding:0;
            box-sizing:border-box;
            font-family:Arial;
        }

        body{
            background:#f5f5f5;
        }

        .container{
            width:90%;
            margin:40px auto;
            display:flex;
            gap:40px;
            background:white;
            padding:30px;
            border-radius:10px;
            box-shadow:0 0 10px rgba(0,0,0,0.1);
        }

        .image-section{
            flex:1;
        }

        .image-section img{
            width:100%;
            max-width:500px;
            border-radius:10px;
        }

        .details{
            flex:1;
        }

        .title{
            font-size:32px;
            margin-bottom:15px;
        }

        .price{
            font-size:28px;
            color:green;
            font-weight:bold;
            margin-bottom:15px;
        }

        .category{
            font-size:18px;
            color:gray;
            margin-bottom:20px;
        }

        .btn{
            display:inline-block;
            padding:12px 25px;
            background:#ffd814;
            color:black;
            text-decoration:none;
            border-radius:8px;
            margin-right:10px;
            font-weight:bold;
        }

        .cart{
            background:#ffa41c;
        }
    </style>

</head>
<body>

<div class="container">

    <div class="image-section">
        <img src="{{ product.image.url }}">
    </div>

    <div class="details">

        <h1 class="title">{{ product.title }}</h1>

        <p class="price">₹ {{ product.price }}</p>

        <p class="category">
            Category : {{ product.category }}
        </p>

        <p>
            Premium Quality Product.
            Best Fashion Collection.
        </p>

        <br><br>

        <a href="#" class="btn">Buy Now</a>

        <a href="#" class="btn cart">Add To Cart</a>

    </div>
<a href="/add-to-cart/{{ product.id }}/">
    <button style="
        background:#ff9900;
        color:white;
        border:none;
        padding:12px 25px;
        border-radius:5px;
        cursor:pointer;">
        Add To Cart 🛒
    </button>
</a>
</div>

</body>
</html>
