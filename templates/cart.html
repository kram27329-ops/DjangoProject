<!DOCTYPE html>
<html>
<head>
    <title>My Cart</title>

    <style>
        body{
            font-family:Arial;
            margin:0;
            background:#f5f5f5;
        }

        /* HEADER */
        .header{
            background:#111827;
            color:white;
            padding:15px;
            text-align:center;
            font-size:22px;
            font-weight:bold;
        }

        /* GRID */
        .cart-container{
            display:grid;
            grid-template-columns: repeat(4, 1fr);
            gap:20px;
            padding:20px;
        }

        .cart-card{
            background:white;
            border-radius:12px;
            overflow:hidden;
            box-shadow:0 2px 8px rgba(0,0,0,0.1);
            transition:0.3s;
        }

        .cart-card:hover{
            transform:scale(1.03);
        }

        .cart-card img{
            width:100%;
            height:220px;
            object-fit:cover;
        }

        .content{
            padding:15px;
        }

        .title{
            font-size:18px;
            font-weight:bold;
        }

        .price{
            color:green;
            font-weight:bold;
            margin-top:5px;
        }

        .btn{
            display:block;
            text-align:center;
            margin-top:10px;
            padding:10px;
            background:#111827;
            color:white;
            text-decoration:none;
            border-radius:6px;
        }

        .empty{
            text-align:center;
            padding:50px;
            font-size:20px;
        }

        /* responsive */
        @media(max-width: 1000px){
            .cart-container{
                grid-template-columns: repeat(2, 1fr);
            }
        }

        @media(max-width: 600px){
            .cart-container{
                grid-template-columns: repeat(1, 1fr);
            }
        }
    </style>
</head>

<body>

<div class="header">🛒 My Cart</div>

{% if cart_items %}

<div class="cart-container">

    {% for item in cart_items %}

    <div class="cart-card">
        <img src="{{ item.product.image.url }}">

        <div class="content">
            <div class="title">{{ item.product.title }}</div>
            <div class="price">₹ {{ item.product.price }}</div>

            <a href="#" class="btn">Remove</a>
        </div>
    </div>

    {% endfor %}

</div>

{% else %}

<div class="empty">
    Your Cart is Empty 
</div>

{% endif %}

</body>
</html>
