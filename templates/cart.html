<!DOCTYPE html>
<html>
<head>
    <title>Cart</title>

    <style>
        body{
            font-family:Arial;
            background:#f5f5f5;
            padding:30px;
        }

        h1{
            text-align:center;
        }

        .box{
            background:white;
            padding:15px;
            margin-bottom:15px;
            border-radius:10px;
            display:flex;
            gap:20px;
            align-items:center;
        }

        img{
            width:100px;
            height:100px;
            object-fit:cover;
            border-radius:8px;
        }

        .price{
            color:green;
            font-weight:bold;
        }

        .qty{
            margin:5px 0;
        }

        .btn-group a{
            margin-right:10px;
            text-decoration:none;
            padding:5px 10px;
            border-radius:5px;
            background:#ddd;
            color:black;
        }

        .total{
            text-align:right;
            font-size:22px;
            font-weight:bold;
            margin-top:20px;
        }

        .btn{
            background:black;
            color:white;
            padding:10px 15px;
            text-decoration:none;
            border-radius:6px;
            display:inline-block;
            margin-top:20px;
        }

        .empty{
            text-align:center;
            font-size:20px;
            color:gray;
        }
    </style>
</head>

<body>

<h1>🛒 My Cart</h1>

{% for item in items %}

<div class="box">

    <img src="{{ item.product.image.url }}">

    <div>
        <h3>{{ item.product.title }}</h3>

        <p class="price">₹ {{ item.product.price }}</p>

        <p class="qty">Qty: {{ item.quantity }}</p>

        <p>
            Item Total: ₹ {{ item.product.price|floatformat:0 }} × {{ item.quantity }}
        </p>

        <div class="btn-group">
            <a href="/cart-increase/{{ item.id }}/">+</a>
            <a href="/cart-decrease/{{ item.id }}/">-</a>
            <a href="/cart-remove/{{ item.id }}/">Remove</a>
        </div>
    </div>

</div>

{% empty %}

<p class="empty">Your Cart is Empty 😢</p>

{% endfor %}

<hr>

<div class="total">
    Grand Total: ₹ {{ total }}
</div>

<a href="/" class="btn">Continue Shopping</a>

</body>
</html>
